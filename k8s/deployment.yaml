apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrollment-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enrollment-system
  template:
    metadata:
      labels:
        app: enrollment-system
    spec:
      containers:
        - name: app
          image: sejin22/enrollment-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081